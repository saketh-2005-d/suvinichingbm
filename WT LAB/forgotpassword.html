<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Bookstore - Forgot Password</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      input[type="email"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="email"]:focus {
        outline: none;
        border-color: #667eea;
      }

      .error {
        color: #e74c3c;
        font-size: 13px;
        margin-top: 5px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .info {
        font-size: 12px;
        color: #27ae60;
        margin-top: 5px;
        display: none;
      }

      .info.show {
        display: block;
      }

      input.invalid {
        border-color: #e74c3c;
      }

      input.valid {
        border-color: #27ae60;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 20px;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .success-message {
        color: #27ae60;
        text-align: center;
        margin-top: 20px;
        font-weight: 600;
        display: none;
        background: #e8f8f5;
        padding: 12px;
        border-radius: 5px;
      }

      .success-message.show {
        display: block;
      }

      .validation-info {
        font-size: 12px;
        color: #666;
        margin-top: 3px;
      }

      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
        display: block;
        margin-top: 8px;
      }

      .back-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔐 Forgot Password</h1>
      <p class="subtitle">
        Enter your email address and we'll send you a password reset link.
      </p>

      <form id="forgotPasswordForm" novalidate>
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email address"
            required
          />
          <div class="validation-info">
            We'll send a reset link to this email
          </div>
          <div class="error" id="emailError"></div>
          <div class="info" id="emailInfo"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit">Send Reset Link</button>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
          ✓ Password reset link sent! Check your email.
        </div>
      </form>

      <div class="back-link">
        <a href="registration.html">← Back to Registration</a>
        <a href="bookstore.html">📚 Browse the Bookstore</a>
      </div>
    </div>

    <script src="forgotpassword.js"></script>
  </body>
</html>
