<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Bookstore - User Registration</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #667eea;
      }

      .error {
        color: #e74c3c;
        font-size: 13px;
        margin-top: 5px;
        display: none;
      }

      .error.show {
        display: block;
      }

      input.invalid {
        border-color: #e74c3c;
      }

      input.valid {
        border-color: #27ae60;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 20px;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .success-message {
        color: #27ae60;
        text-align: center;
        margin-top: 20px;
        font-weight: 600;
        display: none;
      }

      .success-message.show {
        display: block;
      }

      .validation-info {
        font-size: 12px;
        color: #666;
        margin-top: 3px;
      }

      .nav-links {
        text-align: center;
        margin-top: 16px;
      }

      .nav-links a {
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
        display: block;
        margin-top: 8px;
      }

      .nav-links a:hover {
        text-decoration: underline;
      }

      .nav-links .divider {
        color: #ccc;
        margin: 0 6px;
      }

      .mode-toggle {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .mode-btn {
        padding: 8px 16px;
        border: 2px solid #ddd;
        background: white;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .mode-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-color: #667eea;
      }

      .form-group.hidden {
        display: none;
      }

      /* ── Cart Icon in Header ────────────────────────────── */
      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .cart-icon {
        cursor: pointer;
        font-size: 24px;
        position: relative;
        transition: transform 0.2s;
      }

      .cart-icon:hover {
        transform: scale(1.1);
      }

      .cart-count {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #ff6b6b;
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
      }

      /* ── Cart Modal ─────────────────────────────────────── */
      .cart-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        animation: fadeIn 0.3s ease;
      }

      .cart-modal.open {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cart-content {
        background: white;
        border-radius: 10px;
        width: 90%;
        max-width: 600px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }

      .cart-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 10px 10px 0 0;
      }

      .cart-header h2 {
        font-size: 20px;
      }

      .cart-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .cart-close:hover {
        transform: scale(1.2);
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .cart-empty {
        text-align: center;
        color: #999;
        padding: 40px 20px;
        font-size: 16px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 12px;
        background: #f9f9f9;
      }

      .cart-item-info {
        flex: 1;
      }

      .cart-item-title {
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }

      .cart-item-author {
        font-size: 13px;
        color: #888;
        margin-bottom: 6px;
      }

      .cart-item-price {
        font-size: 14px;
        color: #667eea;
        font-weight: 600;
      }

      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 16px;
      }

      .qty-btn {
        background: #ddd;
        border: none;
        width: 24px;
        height: 24px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }

      .qty-btn:hover {
        background: #bbb;
      }

      .qty-display {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
      }

      .cart-item-remove {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.2s;
      }

      .cart-item-remove:hover {
        background: #ff5252;
      }

      .cart-footer {
        border-top: 1px solid #eee;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 0 0 10px 10px;
      }

      .cart-summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #ddd;
      }

      .cart-total {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }

      .cart-total-amount {
        font-size: 24px;
        color: #667eea;
        font-weight: 800;
      }

      .cart-actions {
        display: flex;
        gap: 10px;
      }

      .btn-continue {
        flex: 1;
        padding: 12px;
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-continue:hover {
        background: #e0e0e0;
      }

      .btn-browse {
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          opacity 0.2s;
      }

      .btn-browse:hover {
        transform: translateY(-2px);
        opacity: 0.92;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div style="position: relative">
      <div class="header-top">
        <h2 style="flex: 1; text-align: center">📚 Bookstore</h2>
        <div class="cart-icon" id="cartIcon" onclick="openCart()">
          🛒
          <span class="cart-count" id="cartCount">0</span>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="mode-toggle">
        <button type="button" class="mode-btn active" id="loginMode">
          Login
        </button>
        <button type="button" class="mode-btn" id="registerMode">
          Register
        </button>
      </div>

      <form id="registrationForm" novalidate>
        <!-- Username Field -->
        <div class="form-group" id="usernameGroup">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            required
          />
          <div class="validation-info">Must be at least 5 characters</div>
          <div class="error" id="usernameError"></div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
          <div class="validation-info" id="passwordInfo">
            Must be at least 8 characters
          </div>
          <div class="error" id="passwordError"></div>
        </div>

        <!-- Confirm Password Field (Register Only) -->
        <div class="form-group hidden" id="confirmPasswordGroup">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Re-enter your password"
            required
          />
          <div class="validation-info">Must match the password above</div>
          <div class="error" id="confirmPasswordError"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn">Login to Bookstore</button>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
          ✓ Account created successfully!
        </div>
      </form>

      <div class="nav-links">
        <a href="forgotpassword.html">🔐 Forgot your password?</a>
        <a href="bookstore.html" style="color: #27ae60; margin-top: 12px"
          >📚 Browse Bookstore</a
        >
      </div>
    </div>

    <!-- Shopping Cart Modal -->
    <div class="cart-modal" id="cartModal">
      <div class="cart-content">
        <div class="cart-header">
          <h2>🛒 Shopping Cart</h2>
          <button class="cart-close" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
          <div class="cart-empty">Your cart is empty</div>
        </div>
        <div class="cart-footer">
          <div class="cart-summary">
            <span class="cart-total">Total:</span>
            <span class="cart-total-amount" id="cartTotal">$0.00</span>
          </div>
          <div class="cart-actions">
            <button class="btn-continue" onclick="closeCart()">Close</button>
            <a
              href="bookstore.html"
              class="btn-browse"
              style="
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
              "
              >Browse Books →</a
            >
          </div>
        </div>
      </div>
    </div>

    <script>
      // ── Shopping Cart Management ──────────────────────────────────────
      class ShoppingCart {
        constructor() {
          this.cart = this.loadCart();
        }

        loadCart() {
          const currentUser = localStorage.getItem("currentUser");
          if (!currentUser) return [];
          const cartKey = `cart_${currentUser}`;
          const saved = localStorage.getItem(cartKey);
          return saved ? JSON.parse(saved) : [];
        }

        saveCart() {
          const currentUser = localStorage.getItem("currentUser");
          if (!currentUser) return;
          const cartKey = `cart_${currentUser}`;
          localStorage.setItem(cartKey, JSON.stringify(this.cart));
          updateCartUI();
        }

        removeBook(bookId) {
          this.cart = this.cart.filter((item) => item.id !== bookId);
          this.saveCart();
        }

        updateQuantity(bookId, quantity) {
          const item = this.cart.find((item) => item.id === bookId);
          if (item) {
            if (quantity <= 0) {
              this.removeBook(bookId);
            } else {
              item.quantity = quantity;
              this.saveCart();
            }
          }
        }

        getTotal() {
          return this.cart.reduce(
            (sum, item) => sum + item.price * item.quantity,
            0,
          );
        }

        getItemCount() {
          return this.cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        clear() {
          this.cart = [];
          this.saveCart();
        }
      }

      let cart = new ShoppingCart();

      // ── Cart UI Functions ──────────────────────────────────────────────
      function updateCartUI() {
        const count = cart.getItemCount();
        document.getElementById("cartCount").textContent = count;

        const itemsContainer = document.getElementById("cartItemsContainer");

        if (cart.cart.length === 0) {
          itemsContainer.innerHTML =
            '<div class="cart-empty">Your cart is empty. <a href="bookstore.html" style="color: #667eea">Browse books →</a></div>';
        } else {
          itemsContainer.innerHTML = cart.cart
            .map(
              (item) => `
            <div class="cart-item">
              <div class="cart-item-info">
                <div class="cart-item-title">${item.title}</div>
                <div class="cart-item-author">by ${item.author}</div>
                <div class="cart-item-price">$${item.price.toFixed(2)}</div>
              </div>
              <div class="cart-item-qty">
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                <span class="qty-display">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
              </div>
              <button class="cart-item-remove" onclick="removeFromCart(${item.id})">Remove</button>
            </div>
          `,
            )
            .join("");
        }

        const total = cart.getTotal();
        document.getElementById("cartTotal").textContent = `$${total.toFixed(
          2,
        )}`;
      }

      function openCart() {
        document.getElementById("cartModal").classList.add("open");
        updateCartUI();
      }

      function closeCart() {
        document.getElementById("cartModal").classList.remove("open");
      }

      function removeFromCart(bookId) {
        cart.removeBook(bookId);
        updateCartUI();
      }

      function updateQty(bookId, quantity) {
        cart.updateQuantity(bookId, quantity);
        updateCartUI();
      }

      // ── Close cart when clicking outside ────────────────────────────────
      document
        .getElementById("cartModal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeCart();
          }
        });

      // Initialize cart UI on page load
      updateCartUI();
    </script>
    <script src="registration.js"></script>
  </body>
</html>
