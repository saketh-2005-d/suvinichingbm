<!doctype html>
<html>
  <head>
    <title>Online Book Store</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #fafafa;
      }
      .top-section {
        height: 20vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin: 0;
        color: white;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      p {
        color: white;
        margin: 0;
      }
      .bottom-section {
        display: flex;
        height: 80vh;
        gap: 0;
      }
    </style>
  </head>

  <body style="margin: 0">
    <!-- Top Section -->
    <div class="top-section">
      <div>
        <h2>📚 Bookz</h2>
        <p style="color: white; margin: 10px 0 0 0; font-size: 14px">
          Your Gateway to Endless Stories & Knowledge
        </p>
      </div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">
      <iframe src="menu.html" style="width: 30%; border: none"> </iframe>

      <iframe src="content.html" style="width: 70%; border: none"> </iframe>
    </div>
  </body>
</html>
